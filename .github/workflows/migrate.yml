name: Setup Database

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  setup-db:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Setup database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # Try Flask migration first
          flask --app starter.py db upgrade || true
          
          # If that fails, create tables directly
          python -c "
          from pkg import app, db
          with app.app_context():
              db.create_all()
              print('✅ Tables created!')
          "
      
      - name: Seed database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python seed.py || true