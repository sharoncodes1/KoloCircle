<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KoloCircle · Sign In</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Playfair+Display:ital,wght@0,400;0,700;1,700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/static/css/login.css">
  
</head>
<body>

<div class="login-wrapper fade-in">
    <div class="row g-0">

        <!-- login side -->
        <div class="col-lg-6">
            <div class="brand-side">
                <div class="brand-icon">
                    <i class="bi bi-gem"></i>
                </div>

                <h1>
                    Welcome<br>
                    <span class="accent">Back</span>
                </h1>

                <p class="subtitle">
                    Securely manage your savings, investments, and financial goals
                    from one elegant dashboard.
                </p>

                <div class="trust-badge">
                    <span class="item">
                        <i class="bi bi-shield-check"></i> Bank-grade security
                    </span>
                    <span class="item">
                        <i class="bi bi-star-fill"></i> 4.9 / 5 rating
                    </span>
                </div>

                <img src="https://images.unsplash.com/photo-1554224155-8d04cb21cd6c?w=800&auto=format&fit=crop"
                     alt="Financial dashboard"
                     class="hero-image">
            </div>
        </div>

        <!-- login right section -->
        <div class="col-lg-6">
            <div class="login-side fade-in-delay">

                <!-- my Logo -->
                <div class="logo">
                    <div class="logo-icon">KC</div>
                    <div class="logo-text">Kolo<span>Circle</span></div>
                </div>

                <h2>Sign In</h2>
                <p class="welcome-text">Enter your credentials to continue</p>

                <form method="POST" action="{{ url_for('login') }}">
                 <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <div class="input-group-icon">
                            <i class="bi bi-envelope icon"></i>
                            <input
                                type="email"
                                class="form-control"
                                placeholder="you@example.com"
                                name="email"
                                required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <div class="input-group-icon">
                            <i class="bi bi-lock icon"></i>
                            <input
                                type="password"
                                class="form-control"
                                placeholder="Enter your password"
                                name="password"
                                required>
                        </div>
                    </div>

                    <!-- <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="remember">
                            <label class="form-check-label" for="remember">
                                Remember me
                            </label>
                        </div>
                        <a href="#" class="forgot-link">Forgot Password?</a>
                    </div> -->

                    <button type="submit" class="btn btn-primary btn-login w-100">
                        Sign In <i class="bi bi-arrow-right ms-1"></i>
                    </button>
                </form>

                <!-- Divider -->
                <div class="divider">
                    <span>or continue with</span>
                </div>

                <div class="d-flex gap-3">
                    <button class="social-btn w-50">
                        <i class="bi bi-google"></i> Google
                    </button>
                    <button class="social-btn w-50">
                        <i class="bi bi-apple"></i> Apple
                    </button>
                </div>

                <div class="signup-link">
                    Don't have an account?
                    <a href="/signup/">Create Account</a>
                </div>

            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
